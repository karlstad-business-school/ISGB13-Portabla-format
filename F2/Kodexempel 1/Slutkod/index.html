<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Kodexempel 1 (F2)</title>
  </head>
  <body>
    <header class="hero-banner text-center">
      <div class="container">
        <h1 class="display-3 font-weight-bold mb-3">Global Explorer</h1>
        <p class="lead">Discover details and compare populations of nations around the world</p>
      </div>
    </header>

    <div class="container min-vh-100 pb-5">
      <main>
        <div class="row justify-content-center mb-5 search-container">
          <div class="col-md-8">
            <form id="search-form" class="bg-white p-2 rounded-pill shadow-lg">
              <label for="search" class="sr-only">Search countries</label>
              <div class="input-group">
                <input type="search" id="search" autocomplete="off" placeholder="Enter a country name..." class="form-control border-0 rounded-pill px-4" />
                <div class="input-group-append">
                  <button type="submit" class="btn btn-primary rounded-pill px-5 ml-2">Search</button>
                </div>
              </div>
            </form>
          </div>
        </div>
        
        <div id="preloader" class="text-center mt-5 d-none">
          <div class="spinner-grow text-primary" role="status">
            <span class="sr-only">Loading...</span>
          </div>
          <p class="mt-2 text-primary font-weight-bold">Fetching data...</p>
        </div>

        <div id="content" class="row justify-content-center my-4">
            <!--Här kommer vi visa API data-->
        </div>

        <div class="text-center mb-5">
          <button id="showChartBtn" class="custom-compare-btn" disabled>
            Compare Populations (Search > 2 countries)
          </button>
        </div>

        <div id="chartContainer" class="card p-4 shadow-sm mb-5 w-100 d-none">
          <div class="card-body">
            <canvas id="populationChart"></canvas>
          </div>
        </div>
      </main>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
